<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FAQ Chatbot</title>
</head>
<body>

    <h1>Welcome to My FAQ Chatbot</h1>

    <input type="text" id="question" placeholder="Ask a question">
    <button onclick="getAnswer()">Send</button>

    <p id="answer"></p>

    <script>
        const faqData = [
            {
                question: "What is Python?",
                answer: "Python is a high-level programming language."
            },
            {
                question: "What is machine learning?",
                answer: "Machine learning is a branch of AI that enables systems to learn from data."
            },
            {
                question: "What is NLP?",
                answer: "NLP stands for Natural Language Processing."
            },
            {
                question: "What is cosine similarity?",
                answer: "Cosine similarity measures similarity between two text vectors."
            },
            {
                question: "What is TF-IDF?",
                answer: "TF-IDF converts text into numerical vectors based on word importance."
            }
        ];

        function getAnswer() {
            let userQuestion = document
                .getElementById("question")
                .value
                .trim()
                .toLowerCase()
                .replace("?", "");

            let found = faqData.find(item =>
                item.question.toLowerCase().replace("?", "") === userQuestion
            );

            document.getElementById("answer").innerText =
                found ? found.answer : "Sorry, I couldn't find an answer.";
        }
    </script>

</body>
</html>
